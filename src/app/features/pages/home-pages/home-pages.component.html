@if(base !== 'index-3' && base !== 'index-8' && base !== 'index-9' && base !== 'index-11' ){
<app-home-header/>
}
<router-outlet/>


@if(base !== 'index-4' && base !== 'index-9'){
        <div (click)="scrollToTop()" (keydown)="scrollToTop()" tabindex="1" class="progress-wrap" [class.active-progress]="strokeValue < progress">
  <svg class="progress-circle svg-content" width="100%" height="100%" viewBox="-1 -1 102 102">
    <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" style="transition: stroke-dashoffset 10ms linear 0s"
      attr.stroke-dasharray="{{ progress + 'px' + ',' + progress + 'px' }}"
      attr.stroke-dashoffset="{{ strokeValue + 'px' }}"></path>
  </svg>
</div>
}
