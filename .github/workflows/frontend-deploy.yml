name: Frontend Deploy

on:
  push:
    branches:
      - uat

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build

      - name: Prepare temp folder on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/frontend-deploy-temp
            rm -rf /home/ubuntu/frontend-deploy-temp/*
            sudo chown -R ubuntu:ubuntu /var/www/vetllama-frontend
            mkdir -p /var/www/vetllama-frontend/dist

      - name: Upload new build to temp folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/vetllama-frontend/browser/*"
          target: "/home/ubuntu/frontend-deploy-temp"
          strip_components: 3
          overwrite: true

      - name: Publish build to live folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf /var/www/vetllama-frontend/dist/*
            cp -r /home/ubuntu/frontend-deploy-temp/* /var/www/vetllama-frontend/dist/
            find /var/www/vetllama-frontend -type d -exec chmod 755 {} \;
            find /var/www/vetllama-frontend -type f -exec chmod 644 {} \;
            sudo systemctl reload nginx
